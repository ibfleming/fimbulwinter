name = "Fimbulwinter"
description = "A veteran's Valheim overhaul: deeper combat, loot, creatures, magic and seasons on Fimbulwinter Lite's polished QoL and server tooling foundation."
versionNumber = "2.0.0"
websiteUrl = "https://github.com/ibfleming/fimbulwinter"

